<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Facturation</title>
    <style>
        body { margin:0; font-family:Arial,sans-serif; background:#f8fafc; color:#0f172a; }
        .container { max-width:900px; margin:40px auto; padding:0 20px; }
        .card { background:white; border-radius:20px; padding:30px; box-shadow:0 10px 30px rgba(15,23,42,0.08); }
        select { width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:12px; margin:16px 0; }
        button { background:#2563eb; color:white; border:none; padding:14px 18px; border-radius:12px; cursor:pointer; }
        .success { background:#dcfce7; color:#166534; padding:12px; border-radius:10px; margin-bottom:16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Facturation</h1>
            <p>Formule actuelle : <strong>{{ record[3]|upper }}</strong></p>

            {% if success %}
                <div class="success">{{ success }}</div>
            {% endif %}

            <form method="post" action="/billing">
                <label>Choisir une formule</label>
                <select name="plan">
                    <option value="starter">Starter</option>
                    <option value="pro">Pro</option>
                    <option value="business">Business</option>
                </select>

                <button type="submit">Mettre à jour ma formule</button>
            </form>
        </div>
    </div>
</body>
</html>

{% extends "base.html" %}

{% block title %}Modifier devis{% endblock %}

{% block content %}
<div class="container page">
    <div class="card" style="max-width:860px;margin:auto;">
        <h1>Modifier le devis</h1>

        <form method="post" action="/quote/edit/{{ quote[0] }}">
            <label>Client</label>
            <input type="text" name="client" value="{{ quote[1] }}" required>

            <label>Description</label>
            <textarea name="description" rows="7" required>{{ quote[2] }}</textarea>

            <label>Total HT</label>
            <input type="number" step="0.01" name="total_ht" value="{{ quote[3] }}" required>

            <label>TVA</label>
            <input type="number" step="0.01" name="tva" value="{{ quote[4] }}" required>

            <label>Total TTC</label>
            <input type="number" step="0.01" name="total_ttc" value="{{ quote[5] }}" required>

            <button type="submit">Enregistrer</button>
        </form>
    </div>
</div>
{% endblock %}
